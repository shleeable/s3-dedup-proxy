services:
  S3DedupProxy:
    container_name: s3dedupproxy_proxy
    image: s3dedupproxy_poolmgr
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "23278:23278"
      - "23279:23279"
    depends_on:
      Postgres:
        condition: service_healthy
      S3Proxy:
        condition: service_started

  Postgres:
    container_name: s3dedupproxy_postgres
    image: postgres:17.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d s3proxy -U s3proxy"]
      start_period: 20s
      interval: 30s
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=s3proxy
      - POSTGRES_PASSWORD=s3proxy
      - POSTGRES_DB=s3proxy

  S3Proxy:
    container_name: s3dedupproxy_s3proxy
    image: andrewgaul/s3proxy
    ports:
      - "80:80"
    environment:
      - S3PROXY_AUTHORIZATION=none
